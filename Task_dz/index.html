<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <p class="first">Обычный текст</p>
    <button class="mybtn">кнопка</button>


    <div class="block" id="myBlock">
        <p>Наведи</p>
    </div>


    <button id="toggleButton">Скрыть элемент</button>
    <div class="mdiv" id="myDiv">
        <h1>скрываемый элемент</h1>
    </div>



    <div class="block1" id="block1">Блок 1</div>
    <div class="block2" id="block2">Блок 2</div>
    <div class="block3" id="block3">Блок 3</div>

    <button onclick="changeBg()">Фон блока 1</button>
    <button onclick="changeFont()">Шрифт блока 2</button>
    <button onclick="changeStyle()">Стиль блока 3</button>



    <div class="add-section">
        <input type="text" id="itemInput" placeholder="Введите элемент...">
        <button id="addButton">Добавить</button>
    </div>
    
    <ul id="dynamicList">
    </ul>
    


<table id="colorTable">

            <th>Столбец 1</th>

        <tr>

            <td>Ячейка 11</td>
            <td>Ячейка 12</td>
        </tr>
        <tr>
            <td>Ячейка 13</td>
            <td>Ячейка 14</td>
            <td>Ячейка 15</td>
            <td>Ячейка 16</td>
        </tr>


    <script src="./script.js"></script>

</html>
